<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - YT2MP3</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .content-page { padding: 60px 0; max-width: 800px; margin: 0 auto; text-align: center; }
    h1 { font-size: 36px; margin-bottom: 20px; color: var(--accent); }
    p { font-size: 18px; color: var(--muted); margin-bottom: 40px; }
    .contact-card { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 20px; display: inline-block; min-width: 300px; }
    .email-link { font-size: 24px; font-weight: 700; color: var(--text); text-decoration: none; display: block; margin-top: 10px; }
    .email-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="/">yt2mp3<span class="brand-dot">.lol</span></a>
    </div>
  </header>

  <main class="container content-page">
    <h1>Contact Us</h1>
    <p>Have a question, feedback, or a business inquiry? We'd love to hear from you.</p>

    <div class="contact-card">
      <span>Reach us via email:</span>
      <a href="mailto:support@yt2mp3.lol" class="email-link">support@yt2mp3.lol</a>
    </div>

    <div style="margin-top: 40px; color: var(--muted); font-size: 14px;">
      <p>We typically respond to all inquiries within 24-48 hours.</p>
    </div>
  </main>

  <footer style="padding: 40px 0; text-align: center; border-top: 1px solid var(--border); margin-top: 60px;">
    <div class="container">
      <p>&copy; 2026 YT2MP3.lol - All Rights Reserved.</p>
      <div style="margin-top: 10px; display: flex; justify-content: center; gap: 20px;">
        <a href="/about/">About Us</a>
        <a href="/privacy/">Privacy Policy</a>
        <a href="/contact/">Contact Us</a>
      </div>
    </div>
  </footer>
</body>
</html>
