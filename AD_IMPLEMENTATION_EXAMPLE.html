<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ad Implementation Example - yt2mp3.lol</title>
<link rel="stylesheet" href="/assets/style.css?v=2">
<link rel="stylesheet" href="/assets/ads.css">

<!-- Ad Provider Script (Load Once, Asynchronously) -->
<script async type="application/javascript" src="https://a.magsrv.com/ad-provider.js"></script>

</head>
<body class="has-sticky-ad">

<!-- HEADER -->
<header class="site-header">
  <div class="container header-row">
    <a class="brand" href="/">yt2mp3<span class="brand-dot">.lol</span></a>
    <!-- Your header content -->
  </div>
</header>

<main>
  
  <!-- ═══════════════════════════════════════════════════════════
       AD PLACEMENT 1: Top Banner (Priority 1)
       Desktop: 728x90 | Mobile: 300x100
       ═══════════════════════════════════════════════════════════ -->
  <div class="ad-container ad-top-banner ad-lazy ad-refresh" data-ad-type="banner-top">
    <div class="ad-label">Advertisement</div>
  </div>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="container">
      <h1>YouTube to MP3 Converter</h1>
      
      <!-- CONVERTER INTERFACE -->
      <div id="converter" class="converter-card">
        <!-- Your converter form -->
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════
       AD PLACEMENT 2: Below Converter (Priority 2)
       Desktop: 728x90 | Mobile: 300x100
       ═══════════════════════════════════════════════════════════ -->
  <div class="ad-container ad-below-converter ad-lazy ad-refresh" data-ad-type="banner-bottom">
    <div class="ad-label">Advertisement</div>
  </div>

  <!-- CONTENT WITH SIDEBAR LAYOUT -->
  <div class="content-with-sidebar">
    
    <!-- MAIN CONTENT -->
    <div class="main-content">
      
      <!-- Content Section 1 -->
      <section class="section">
        <div class="container">
          <h2>How It Works</h2>
          <p>Your content here...</p>
        </div>
      </section>

      <!-- ═══════════════════════════════════════════════════════════
           AD PLACEMENT 4: In-Content (Priority 4)
           All devices: 300x250
           ═══════════════════════════════════════════════════════════ -->
      <div class="ad-container ad-native ad-lazy" data-ad-type="in-content">
        <div class="ad-label">Sponsored</div>
      </div>

      <!-- Content Section 2 -->
      <section class="section alt">
        <div class="container">
          <h2>Features</h2>
          <p>More content...</p>
        </div>
      </section>

      <!-- FAQ Section -->
      <section class="section">
        <div class="container">
          <h2>FAQ</h2>
          <!-- FAQ content -->
        </div>
      </section>

    </div>

    <!-- ═══════════════════════════════════════════════════════════
         AD PLACEMENT 3: Sidebar Sticky (Priority 3)
         Desktop Only: 300x250
         ═══════════════════════════════════════════════════════════ -->
    <aside class="sidebar">
      <div class="ad-container ad-sidebar ad-lazy ad-refresh" data-ad-type="sidebar">
        <div class="ad-label">Advertisement</div>
      </div>
    </aside>
    
  </div>

</main>

<!-- FOOTER -->
<footer class="site-footer">
  <!-- Your footer content -->
</footer>

<!-- ═══════════════════════════════════════════════════════════
     AD PLACEMENT 5: Mobile Sticky Bottom (Mobile Only)
     Mobile: 300x50
     ═══════════════════════════════════════════════════════════ -->
<div class="ad-sticky-bottom ad-lazy" data-ad-type="sticky">
  <button class="ad-close-btn" aria-label="Close ad">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
      <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="ad-label">Advertisement</div>
</div>

<!-- Load Scripts -->
<script src="/assets/app.js?v=2"></script>
<script src="/assets/ads.js"></script>

<!-- Initialize Ad Provider -->
<script>
(AdProvider = window.AdProvider || []).push({"serve": {}});
</script>

</body>
</html>
