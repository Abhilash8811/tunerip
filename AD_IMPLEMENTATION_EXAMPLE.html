<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ad Implementation Example - yt2mp3.lol</title>
<link rel="stylesheet" href="/assets/style.css?v=2">
<link rel="stylesheet" href="/assets/ads.css">

<!-- Your Ad Provider Script (Asynchronous) -->
<script async type="application/javascript" src="https://a.magsrv.com/ad-provider.js"></script>
<script>
  (AdProvider = window.AdProvider || []).push({"serve": {}});
</script>

</head>
<body class="has-sticky-ad">

<!-- HEADER (existing) -->
<header class="site-header">
  <!-- Your existing header -->
</header>

<main>
  <!-- AD PLACEMENT 1: Top Banner (High Priority) -->
  <div class="ad-container ad-top-banner ad-lazy ad-refresh" data-ad-type="banner" data-zone-id="5914446">
    <div class="ad-label">Advertisement</div>
    <!-- Ad will be loaded here by ads.js -->
  </div>

  <!-- HERO SECTION (existing) -->
  <section class="hero">
    <div class="container">
      <h1>YouTube to MP3 Converter</h1>
      
      <!-- CONVERTER INTERFACE (existing) -->
      <div id="converter" class="converter-card">
        <!-- Your existing converter -->
      </div>
    </div>
  </section>

  <!-- AD PLACEMENT 2: Below Converter (High Priority) -->
  <div class="ad-container ad-below-converter ad-lazy ad-refresh" data-ad-type="banner" data-zone-id="5914446">
    <div class="ad-label">Advertisement</div>
    <!-- Ad will be loaded here -->
  </div>

  <!-- CONTENT WITH SIDEBAR LAYOUT (Desktop) -->
  <div class="content-with-sidebar">
    <!-- MAIN CONTENT -->
    <div class="main-content">
      
      <!-- CONTENT SECTION 1 -->
      <section class="section">
        <div class="container">
          <h2>How to Convert YouTube to MP3</h2>
          <p>Your content here...</p>
        </div>
      </section>

      <!-- AD PLACEMENT 4: In-Content Native (Medium Priority) -->
      <div class="ad-container ad-native ad-lazy" data-ad-type="native" data-zone-id="5914446">
        <div class="ad-label">Sponsored</div>
        <!-- Native ad will be loaded here -->
      </div>

      <!-- CONTENT SECTION 2 -->
      <section class="section alt">
        <div class="container">
          <h2>Features</h2>
          <p>More content...</p>
        </div>
      </section>

      <!-- AD PLACEMENT 4b: Another In-Content Ad -->
      <div class="ad-container ad-native ad-lazy" data-ad-type="native" data-zone-id="5914446">
        <div class="ad-label">Sponsored</div>
      </div>

      <!-- MORE CONTENT SECTIONS -->
      <section class="section">
        <div class="container">
          <h2>FAQ</h2>
          <!-- FAQ content -->
        </div>
      </section>

    </div>

    <!-- AD PLACEMENT 3: Sidebar Sticky (Desktop Only) -->
    <aside class="sidebar">
      <div class="ad-container ad-sidebar ad-lazy ad-refresh" data-ad-type="sidebar" data-zone-id="5914446">
        <div class="ad-label">Advertisement</div>
        <!-- Sidebar ad (300x250 or 300x600) -->
      </div>
    </aside>
  </div>

</main>

<!-- FOOTER (existing) -->
<footer class="site-footer">
  <!-- Your existing footer -->
</footer>

<!-- AD PLACEMENT 5: Mobile Sticky Bottom (Mobile Only) -->
<div class="ad-sticky-bottom ad-lazy" data-ad-type="sticky" data-zone-id="5914446">
  <button class="ad-close-btn" aria-label="Close ad">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
      <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="ad-label">Advertisement</div>
  <!-- Mobile sticky ad (320x50) -->
</div>

<!-- Load your existing scripts -->
<script src="/assets/app.js?v=2"></script>

<!-- Load ad management script -->
<script src="/assets/ads.js"></script>

<!-- Trigger interstitial after conversion (example) -->
<script>
// In your existing app.js, after a successful conversion:
// window.dispatchEvent(new Event('conversionComplete'));

// Example:
document.getElementById('convert-form').addEventListener('submit', function(e) {
  // ... your existing conversion logic ...
  
  // After conversion completes successfully:
  setTimeout(function() {
    window.dispatchEvent(new Event('conversionComplete'));
  }, 2000);
});
</script>

</body>
</html>
