# Render.com Blueprint — one-click backend deploy.
# Use the "Deploy to Render" button in the README, or manually:
#   1. Create a new Blueprint in Render dashboard
#   2. Point it at this repo
#   3. Render reads this file and provisions the service
services:
  - type: web
    name: ytmp3-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: STORAGE_DIR
        value: /tmp/ytconvert
      - key: FILE_TTL_SECONDS
        value: "1800"
      - key: MAX_DURATION_SECONDS
        value: "10800"
      # Optional: set these in the Render dashboard to unblock YouTube bot checks at scale.
      # - key: YTDLP_PROXY
      #   sync: false
      # - key: YTDLP_COOKIES_FILE
      #   sync: false
    # Note: Render free tier does not support persistent disks.
    # Files are written to /tmp (ephemeral) and auto-cleaned after 30 min via FILE_TTL_SECONDS,
    # which matches our cleanup schedule anyway. For persistence across restarts, upgrade to
    # Starter ($7/mo) and add a disk block: { name: data, mountPath: /data, sizeGB: 1 }.
