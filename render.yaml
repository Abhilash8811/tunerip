# Render.com Blueprint — one-click backend deploy.
# Native Python runtime (no Dockerfile needed). Uses imageio-ffmpeg's bundled
# static FFmpeg binary, so no system package install is required.
services:
  - type: web
    name: ytmp3-api
    runtime: python
    plan: free
    region: oregon
    rootDir: api
    buildCommand: bash build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: STORAGE_DIR
        value: /tmp/ytconvert
      - key: FILE_TTL_SECONDS
        value: "1800"
      - key: MAX_DURATION_SECONDS
        value: "10800"
      # Optional: set these in the Render dashboard to unblock YouTube bot checks at scale.
      # - key: YTDLP_PROXY
      #   sync: false
      # - key: YTDLP_COOKIES_FILE
      #   sync: false
    # Note: Render free tier does not support persistent disks.
    # Files write to /tmp (ephemeral) and auto-clean after 30 min via FILE_TTL_SECONDS.
